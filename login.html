<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>

<body>
    <main>
        <div>
            <video class="video_inicial" src="Assets/video.login.mp4" class="object-fit-scale" autoplay loop muted
                playsinline></video>
            <div class="container_login">
                <p class="login">Login</p>
                <div id="form">
                    <form action="">
                        <label class="label_login" for="">Email</label>
                        <input class="form_text" type="text" placeholder="email">
                        <br>
                        <label class="label_login" for="">Senha</label>
                        <input class="form_text" type="text" placeholder="senha">
                        <br>
                        <p >Não tem conta? clique para cadastrar</p>
                        <br>
                        <button id="button_login" onclick="entrar">Entrar</button>
                    </form>
                </div>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
