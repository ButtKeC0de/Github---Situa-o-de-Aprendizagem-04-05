<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main>
        <div>
            <video class="video_inicial object-fit-scale" src="../Assets/videos/video.login.mp4" autoplay loop muted
                playsinline></video>
            <div class="container_login_2">
                <img src="../Assets/logos/logo_sem_fundo.png" alt="logo" class="logo_login">
                <div id="form">
                    <form id="formCadastro">
                        <label class="label_login" for="emailCadastro">Email</label>
                        <input class="form_text" type="email" id="emailCadastro" placeholder="Escolha seu email" required>
                        <br>
                        <label class="label_login" for="senhaCadastro">Senha</label>
                        <input class="form_text" type="password" id="senhaCadastro" placeholder="Escolha sua senha" required>
                        <br>
                        <label class="label_login" for="confirmaSenha">Confirmar Senha</label>
                        <input class="form_text" type="password" id="confirmaSenha" placeholder="Confirme sua senha" required>
                        <br>
                        
                        <div class="login_1">
                            <a href="../public/login.html" id="text_log" style="text-decoration: none; color: inherit; display: block; cursor: pointer; text-align: center;">Já tem conta? Voltar para o Login.</a>
                        </div>

                        <br>
                        <button id="button_login" type="submit">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="../scripts/cadastro.js"></script>
</body>

</html>
