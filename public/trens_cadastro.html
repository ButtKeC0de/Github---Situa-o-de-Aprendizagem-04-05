<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Trem</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/cadastro_trem.css">
    
</head>
<body>

    <div class="app-container">

        <aside class="sidebar">

            <div class="logo-area">
                <img src="../Assets/logos/Logo.png" alt="Logo">
            </div>

            <div class="menu-icons">

                <div class="icon-btn">
                    <img src="../Assets/Images/Trilhos.png" alt="">
                </div>

                <div class="icon-btn">
                    <img src="../Assets/Images/Painel Trem.png" alt="">
                </div>

                <div class="icon-btn">
                    <img src="../Assets/Images/Configurações.png" alt="">
                </div>

                <div class="icon-btn">
                    <img src="../Assets/Images/Sair.png" alt="">
                </div>

            </div>

        </aside>

        <main class="content">

            <section class="painel-cadastro">

                <h1 class="titulo">Cadastrar trem</h1>

                <div class="row g-4">

                    <div class="col-lg-8">

                        <div class="row g-4">

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o ID do trem</label>
                                    <input type="text" placeholder="Coloque o ID">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o ID do trem</label>
                                    <input type="text" placeholder="Coloque o ID">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o apelido do trem</label>
                                    <input type="text" placeholder="Coloque o apelido">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Empresa operadora</label>
                                    <input type="text" placeholder="Coloque a operadora">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Tipo do trem</label>
                                    <input type="text" placeholder="Coloque o tipo">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Número de vagões</label>
                                    <input type="text" placeholder="Coloque o número">
                                </div>
                            </div>

                        </div>

                    </div>

                    <div class="col-lg-4">

                        <div class="botao-container">

                            <button class="btn-enviar">
                                Enviar
                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

</body>
       
</html>
