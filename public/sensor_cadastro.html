<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Trem</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/cadastro_trem.css">

    <link rel="stylesheet" href="../css/home.css">



</head>

<body>

    <div class="app-container">

        <div class="d-flex h-100">
            <div class="principal">
                <div>
                    <div>
                        <img class="logos" src="../Assets/logos/Logo.png" alt="Logo">
                    </div>

                    <div id="logos_barra_lateral">
                        <div>
                            <img class="logos" src="../Assets/logos/icon_rotas.png" alt="">
                        </div>

                        <div>
                            <img class="logos" src="../Assets/logos/icon_trem.png" alt="">
                        </div>

                        <div>
                            <img class="logos" src="../Assets/logos/icon_sensores.png" alt="">
                        </div>

                        <div>
                            <a href="../index.html">
                                <img class="logos" src="../Assets/logos/icon_saida.png" alt="">
                            </a>
                        </div>
                    </div>


                </div>
            </div>
        </div>


        <main class="content">

            <section class="painel-cadastro">

                <h1 class="titulo">Cadastrar trem</h1>

                <div class="row g-4">

                    <div class="col-lg-8">

                        <div class="row g-4">

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o ID do trem</label>
                                    <input type="text" placeholder="Coloque o ID">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o ID do trem</label>
                                    <input type="text" placeholder="Coloque o ID">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Digite o apelido do trem</label>
                                    <input type="text" placeholder="Coloque o apelido">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Empresa operadora</label>
                                    <input type="text" placeholder="Coloque a operadora">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Tipo do trem</label>
                                    <input type="text" placeholder="Coloque o tipo">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card-input">
                                    <label>Número de vagões</label>
                                    <input type="text" placeholder="Coloque o número">
                                </div>
                            </div>

                        </div>

                    </div>

                    <div class="col-lg-4">

                        <div class="botao-container">

                            <button class="btn-enviar">
                                Enviar
                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
